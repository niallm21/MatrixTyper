<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatrixTyper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="matrix-theme phosphor-green">
  <!-- Matrix Rain Canvas Overlay -->
  <canvas id="matrix-canvas"></canvas>

  <!-- CRT Screen Filter Effects -->
  <div class="crt-overlay"></div>
  <div class="crt-vignette"></div>

  <!-- Top Hover Menu Bar -->
  <div class="menu-trigger-top"></div>
  <header id="top-menu" class="hover-menu top-menu-hidden">
    <div class="menu-brand">MATRIX//TYPER</div>
    <nav class="menu-actions">
      <button id="btn-new" aria-label="Create a new document" title="Create a new document (Ctrl + N)">NEW</button>
      <button id="btn-open" aria-label="Open an encrypted document" title="Open an encrypted document (Ctrl + O)">OPEN</button>
      <button id="btn-save" aria-label="Save document" title="Save document (Ctrl + S)">SAVE</button>
      <button id="btn-save-as" aria-label="Save document as" title="Save document as... (Ctrl + Shift + S)">SAVE AS</button>
      <button id="btn-settings" aria-label="Adjust preferences" title="Adjust preferences">SETTINGS</button>
      <button id="btn-fullscreen" aria-label="Toggle fullscreen" title="Toggle fullscreen (F11 / Esc)">FULLSCREEN</button>
      <button id="btn-quit" class="danger" aria-label="Exit application" title="Exit application (Ctrl + Q)">QUIT</button>
    </nav>
  </header>

  <!-- Central Writing Area -->
  <main id="editor-container">
    <div 
      id="editor" 
      contenteditable="true" 
      spellcheck="false"
      placeholder="Begin typing into the void..."
      aria-label="Document editor"
      autofocus
    ></div>
  </main>

  <!-- Bottom Hover Status Bar -->
  <div class="menu-trigger-bottom"></div>
  <footer id="bottom-status" class="hover-menu bottom-status-hidden">
    <div class="status-left">
      <span id="file-name">Untitled Document</span>
      <span id="save-status" class="status-badge"></span>
    </div>
    <div class="status-right">
      <span id="stat-words">0 words</span>
      <span class="separator">|</span>
      <span id="stat-chars">0 chars</span>
      <span class="separator">|</span>
      <span id="stat-read-time">0 min read</span>
    </div>
  </footer>

  <!-- Settings Dialog Overlay -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 class="modal-title">SYSTEM CONFIGURATION</h2>
      
      <div class="settings-grid">
        
        <!-- Text Size -->
        <div class="setting-item">
          <label for="setting-font-size">Font Size</label>
          <div class="setting-control-row">
            <input type="range" id="setting-font-size" min="14" max="28" step="1" value="18">
            <span id="font-size-val">18px</span>
          </div>
        </div>

        <!-- Line Spacing -->
        <div class="setting-item">
          <label for="setting-line-height">Line Spacing</label>
          <select id="setting-line-height">
            <option value="1.3">Single (1.3)</option>
            <option value="1.6" selected>Normal (1.6)</option>
            <option value="2.0">Double (2.0)</option>
            <option value="2.4">Comfortable (2.4)</option>
          </select>
        </div>

        <!-- Layout Width -->
        <div class="setting-item">
          <label for="setting-layout-width">Writing Column Width</label>
          <div class="setting-control-row">
            <input type="range" id="setting-layout-width" min="500" max="2500" step="50" value="2500">
            <span id="layout-width-val">100% (Full)</span>
          </div>
        </div>

        <!-- Matrix Color Hue -->
        <div class="setting-item">
          <label for="setting-color-theme">Phosphor Color</label>
          <select id="setting-color-theme">
            <option value="phosphor-green" selected>Matrix Green (Classic)</option>
            <option value="phosphor-amber">Vintage Amber</option>
            <option value="phosphor-cyan">Terminal Cyan</option>
            <option value="phosphor-white">Paper White</option>
          </select>
        </div>

        <!-- Glow Intensity -->
        <div class="setting-item">
          <label for="setting-glow-blur">Text Glow Intensity</label>
          <div class="setting-control-row">
            <input type="range" id="setting-glow-blur" min="0" max="12" step="1" value="6">
            <span id="glow-blur-val">6px</span>
          </div>
        </div>

        <!-- CRT Effects -->
        <div class="setting-item checkbox-item">
          <label for="setting-crt-effects">
            <input type="checkbox" id="setting-crt-effects">
            <span>Enable CRT Screen Scanlines</span>
          </label>
        </div>

        <!-- Typewriter Audio -->
        <div class="setting-item">
          <label for="setting-volume">Typewriter Click Volume</label>
          <div class="setting-control-row">
            <input type="range" id="setting-volume" min="0" max="100" step="5" value="50">
            <span id="volume-val">50%</span>
          </div>
        </div>

        <!-- Sound Preset -->
        <div class="setting-item">
          <label for="setting-sound-preset">Mechanical Sound Type</label>
          <select id="setting-sound-preset">
            <option value="mechanical" selected>Standard Mechanical Key</option>
            <option value="retro-synth">Retro Click Synth</option>
            <option value="heavy-buckling">Buckling Spring</option>
            <option value="off">Sounds Disabled</option>
          </select>
        </div>

        <!-- Auto-Save -->
        <div class="setting-item">
          <label for="setting-autosave">Draft Auto-Save</label>
          <select id="setting-autosave">
            <option value="0">Disabled</option>
            <option value="30">Every 30 seconds</option>
            <option value="60" selected>Every minute</option>
            <option value="300">Every 5 minutes</option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button id="btn-close-settings" class="btn-primary">APPLY & RETURN</button>
      </div>
    </div>
  </div>

  <!-- Password Prompt Modal -->
  <div id="password-modal" class="modal-overlay hidden">
    <div class="modal-content" style="max-width: 400px; gap: 15px;">
      <h2 id="password-modal-title" class="modal-title">ENCRYPTION KEY</h2>
      <p id="password-modal-desc" style="font-size: 13px; text-align: center; opacity: 0.8;">Enter password for file encryption.</p>
      
      <div class="setting-item">
        <input type="password" id="password-input" placeholder="Password" style="width: 100%; background: #000; color: var(--text-color); border: 1px solid var(--border-color); padding: 10px; font-family: 'Share Tech Mono', monospace; font-size: 14px; outline: none; border-radius: 2px;">
      </div>

      <div class="modal-footer" style="display: flex; gap: 10px; justify-content: center; margin-top: 5px;">
        <button id="btn-password-submit" style="flex: 1; padding: 10px;">SUBMIT</button>
        <button id="btn-password-cancel" style="flex: 1; padding: 10px;">CANCEL</button>
      </div>
    </div>
  </div>

  <div id="search-prompt" class="search-prompt hidden" role="search" aria-label="Search document">
    <input id="search-input" type="text" autocomplete="off" spellcheck="false" placeholder="SEARCH">
    <span id="search-count">0/0</span>
  </div>

  <script src="editor.js"></script>
</body>
</html>
